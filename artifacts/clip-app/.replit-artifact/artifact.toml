kind = "mobile"
previewPath = "/"
title = "Clip"
version = "1.0.0"
id = "artifacts/clip-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/" ]
localPort = 21776

[services.development]
run = "pnpm --filter @workspace/clip-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clip-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/clip-app", "run", "serve" ]

[services.env]
PORT = "21776"
BASE_PATH = "/"
